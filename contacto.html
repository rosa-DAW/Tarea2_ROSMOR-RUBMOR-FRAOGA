<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Sabores del Mundo</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header class="header">
    <div class="contenedor">
      <h1>Sabores del Mundo</h1>
      <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="articulos.html">Artículos</a>
        <a href="galeria.html">Galería</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="seccion">
    <div class="contenedor">
      <h2>Formulario de contacto</h2>

      <h3>Estamos aquí para ayudarte</h3>

      <p>Si tienes cualquier duda o sugerencia sobre nuestras recetas, no dudes en escribirnos a través del siguiente formulario.</p>

      <form id="formulario-contacto" class="formulario">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required>

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono">

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>

        <button type="submit" class="boton">Enviar</button>
      </form>

      <p id="mensaje-formulario" class="mensaje-formulario"></p>
    </div>
  </main>

  <footer class="footer">
    <div class="contenedor">
      <p>&copy; 2026 Sabores del Mundo</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
